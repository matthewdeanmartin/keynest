---
site_name: keynest
site_url: https://keynest.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: 'Developer secret workbench: a pure-Python keystore with GUI and
  CLI for OS keyring and AWS Secrets Manager'
repo_url: https://github.com/matthewdeanmartin/keynest
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Overview:
      - Project overview: overview/README.md
      - Concepts and storage: concepts.md
      - Repository-aware defaults: repositories.md
      - Security model: security.md
  - Installation: installation.md
  - Usage:
      - Quick Start: usage/quickstart.md
      - CLI reference: usage/cli.md
      - Desktop GUI: usage/gui.md
  - AWS Secrets Manager: aws.md
  - Contributing: extending/CONTRIBUTING.md
  - Change Log: https://github.com/matthewdeanmartin/keynest/blob/main/CHANGELOG.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
